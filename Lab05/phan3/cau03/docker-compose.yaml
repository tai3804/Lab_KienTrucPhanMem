services:
  flask1:
    build: ./flaskapp
    container_name: cau03-flask1
    environment:
      INSTANCE_NAME: flask1
    expose:
      - "5000"
    networks:
      - lb_net

  flask2:
    build: ./flaskapp
    container_name: cau03-flask2
    environment:
      INSTANCE_NAME: flask2
    expose:
      - "5000"
    networks:
      - lb_net

  nginx:
    image: nginx:alpine
    container_name: cau03-nginx
    depends_on:
      - flask1
      - flask2
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lb_net

networks:
  lb_net:
    driver: bridge
