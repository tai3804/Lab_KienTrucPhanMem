services:
  db:
    image: mariadb:11
    container_name: cau09-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud123
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - nextcloud_net

  redis:
    image: redis:7-alpine
    container_name: cau09-redis
    restart: unless-stopped
    networks:
      - nextcloud_net

  nextcloud:
    image: nextcloud:latest
    container_name: cau09-nextcloud
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "80:80"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud123
      REDIS_HOST: redis
    volumes:
      - nextcloud_data:/var/www/html
    networks:
      - nextcloud_net

volumes:
  db_data:
  nextcloud_data:

networks:
  nextcloud_net:
    driver: bridge
