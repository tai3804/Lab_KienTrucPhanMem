services:
  web:
    build: ./app
    container_name: cau08-django
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: django-secret-key
    volumes:
      - ./app:/app
    networks:
      - django_net

  celery:
    build: ./app
    container_name: cau08-celery
    command: celery -A project worker --loglevel=info
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: django-secret-key
    volumes:
      - ./app:/app
    networks:
      - django_net

  redis:
    image: redis:7-alpine
    container_name: cau08-redis
    ports:
      - "6379:6379"
    networks:
      - django_net

networks:
  django_net:
    driver: bridge
