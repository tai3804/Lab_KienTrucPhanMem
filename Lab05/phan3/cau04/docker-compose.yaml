services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cau04-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitor_net

  prometheus:
    image: prom/prometheus:latest
    container_name: cau04-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitor_net

  grafana:
    image: grafana/grafana:latest
    container_name: cau04-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitor_net

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitor_net:
    driver: bridge
