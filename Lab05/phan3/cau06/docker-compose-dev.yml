services:
  app:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python app.py"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/workspace
    environment:
      APP_ENV: development

  tests:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh ./test-runner.sh
    volumes:
      - ./app:/workspace
